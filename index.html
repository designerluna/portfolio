<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Luna's UX Design Portfolio - Gateway Entry Page">
  <title>Luna | UX Designer Portfolio Gateway</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="img/logo.png" type="image/x-icon">
</head>
<body class="landing-body">
  <canvas id="space-canvas"></canvas>

  <main class="login-container">
    <div class="login-card">
      <img src="img/logo.png" alt="Luna Logo" class="logo-img">
      <h1>LUNA</h1>
      <p class="subtitle">UX Designer Portfolio</p>
      
      <form id="password-form" autocomplete="off">
        <div class="form-group">
          <label for="site-password">Protected Access</label>
          <input type="password" id="site-password" class="form-control" placeholder="••••••••" required autofocus>
        </div>
        <div id="password-error" class="password-error"></div>
        <button type="submit" class="btn btn-primary">
          Unlock Portfolio
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </form>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
